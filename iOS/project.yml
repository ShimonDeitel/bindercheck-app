name: Bindercheck
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Bindercheck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Bindercheck/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bindercheck
        INFOPLIST_FILE: Bindercheck/Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: W7Q885Q59C
    info:
      path: Bindercheck/Sources/Info.plist
      properties:
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        CFBundleDisplayName: Bindercheck
        ITSAppUsesNonExemptEncryption: false
  BindercheckTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Bindercheck/Tests
    dependencies:
      - target: Bindercheck
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

  BindercheckUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Bindercheck/UITests
    dependencies:
      - target: Bindercheck
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Bindercheck:
    build:
      targets:
        Bindercheck: all
    test:
      targets:
        - BindercheckTests
        - BindercheckUITests
    run:
      config: Debug
    archive:
      config: Release
